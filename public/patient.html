<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Patient Registration</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h2 id="title">Register Patient</h2>

<label id="lbl-name">Full Name</label><br>
<input id="name"><br>

<label id="lbl-dept">Department</label><br>
<select id="department">
  <option>General</option>
  <option>Pediatrics</option>
  <option>Dentistry</option>
</select><br>

<label id="lbl-time">Time (HH:MM)</label><br>
<input id="time" type="time"><br>

<label id="lbl-day">Day</label><br>
<input type="date" id="day" value=""><br>

<button id="btn-register" onclick="registerPatient()">Register</button>
<button onclick="switchLanguage()" class="lang">Switch Language</button>

<h3 id="queue-info"></h3>
</div>

<script>
let lang="en";
let currentPatientId=null;
let currentDay=null;

const texts={
en:["Register Patient","Full Name","Department","Time (HH:MM)","Day","Register"],
ru:["Регистрация пациента","Полное имя","Отделение","Время (ЧЧ:ММ)","День","Зарегистрироваться"],
kg:["Пациентти каттоо","Толук аты","Бөлүм","Убакыт (ЧЧ:ММ)","Күн","Катталуу"]
};

function switchLanguage(){
  lang = lang==="en"?"ru":lang==="ru"?"kg":"en";
  [document.getElementById("title").innerText,
   document.getElementById("lbl-name").innerText,
   document.getElementById("lbl-dept").innerText,
   document.getElementById("lbl-time").innerText,
   document.getElementById("lbl-day").innerText,
   document.getElementById("btn-register").innerText] = texts[lang];
}

function registerPatient(){
  const patient={
    name: document.getElementById("name").value,
    department: document.getElementById("department").value,
    time: document.getElementById("time").value,
    day: document.getElementById("day").value || new Date().toISOString().slice(0,10)
  };
  currentDay = patient.day;

  fetch("/api/register-patient",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(patient)
  }).then(res=>res.json())
    .then(data=>{
      currentPatientId = data.id;
      updateQueueInfo();
    });
}

function updateQueueInfo(){
  if(!currentPatientId) return;
  fetch("/api/patients?day="+currentDay)
    .then(res=>res.json())
    .then(allPatients=>{
      const me = allPatients.find(p=>p.id===currentPatientId);
      if(me){
        const position = allPatients.filter(p=>p.department===me.department && (p.status==="Waiting" || p.status==="In Progress") && p.queueNumber <= me.queueNumber).length;
        const statusClass = "status-" + me.status.replace(/\s/g,'');
        document.getElementById("queue-info").innerHTML = 
          `<span class="${statusClass}">Your Queue Number: ${me.queueNumber}, Position: ${position}, Status: ${me.status}</span>`;
      }
    });
}

setInterval(updateQueueInfo,3000);
</script>
</body>
</html>
